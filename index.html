<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>気づかずエシカル</title>
    <!-- プレミアムなタイポグラフィの導入: Lora & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- ヒーローセクション: 思わず引き込まれる導入文 -->
        <header class="hero-section">
            <h1 class="brand-title">気づかずエシカル</h1>
            <p class="brand-message">
                エシカルとは、世界を思いやる選択のこと。<br>
                例えば「戦争のない平和な世界」を願っていても、日々の買い物がそこにどう繋がっているかを見極めるのは簡単ではありません。<br>
                <span>あなたの純粋な願いと消費活動を自然に結びつけ、<br>気づかないうちに心地よい選択ができるようサポートします。</span>
            </p>
        </header>

        <main class="main-content">
            <!-- 選択画面: 凝縮されたインプットUI -->
            <section id="screen-selection" class="screen active">
                <div class="card-ui">
                    <div class="section-header">
                        <span class="step-badge">STEP 01</span>
                        <h2 class="section-title">ライフスタイル</h2>
                    </div>
                    <div id="lifestyle-options" class="options-grid"></div>
                </div>

                <div class="card-ui">
                    <div class="section-header">
                        <span class="step-badge">STEP 02</span>
                        <h2 class="section-title">趣味・好きなこと</h2>
                    </div>
                    <div id="hobby-options" class="tag-cloud"></div>
                </div>

                <div class="card-ui">
                    <div class="section-header">
                        <span class="step-badge">STEP 03</span>
                        <h2 class="section-title">大切にしたい価値観</h2>
                    </div>
                    <div id="ethical-sensitivity-sliders" class="sensitivity-container"></div>
                </div>

                <div class="sticky-action">
                    <button id="btn-generate" class="btn-primary">エシカルリストを生成する</button>
                </div>
            </section>

            <!-- 結果画面 -->
            <section id="screen-result" class="screen">
                <div class="section-header">
                    <h2 class="section-title">あなただけの買い物リスト</h2>
                </div>
                <div id="result-container" class="results-grid"></div>
                <button id="btn-restart" class="btn-secondary">選択し直す</button>
            </section>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/algorithm.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
