<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>気づかずエシカル | Ethical Shopping List</title>
    <!-- 明朝体を排除し、モダンなゴシック体に統一 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- ヒーロー: 正しいサービス名を掲げる -->
        <header class="hero-section">
            <h1 class="brand-title">気づかず<br>エシカル</h1>
            <p class="brand-message">
                <b>気づかずエシカル。</b><br>
                世界の平和を願いながら、日々の買い物を変える。<br>
                あなたの日常を、もっとも美しくアップデートします。
            </p>
        </header>

        <main>
            <!-- 選択画面 -->
            <div id="screen-selection" class="screen active">
                <section class="card-ui">
                    <h2 class="section-title">LIFESTYLE</h2>
                    <div id="lifestyle-options" class="options-grid"></div>
                </section>

                <section class="card-ui">
                    <h2 class="section-title">HOBBIES</h2>
                    <div id="hobby-options" class="tag-cloud"></div>
                </section>

                <section class="card-ui">
                    <h2 class="section-title">SENSITIVITY</h2>
                    <div id="ethical-sensitivity-sliders"></div>
                </section>

                <div class="sticky-action">
                    <button id="btn-generate" class="btn-primary">
                        <span>VIEW MY CURATION</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>

            <!-- 結果画面 -->
            <div id="screen-result" class="screen">
                <header class="section-header" style="margin-bottom: 40px;">
                    <h2 class="section-title">CURATED FOR YOU</h2>
                    <button id="btn-restart" style="color:var(--color-primary);border:none;background:none;font-weight:900;cursor:pointer;font-size:0.9rem;">← START OVER</button>
                </header>
                <div id="result-container"></div>
            </div>
        </main>
    </div>

    <script src="js/whitelist.js"></script>
    <script src="js/data.js"></script>
    <script src="js/algorithm.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
