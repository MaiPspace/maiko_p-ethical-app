<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>気づかずエシカル</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <section id="screen-selection" class="screen active">
            <div class="hero-header">
                気づかずエシカル
            </div>
            
            <div class="selection-container">
                <h2>ライフスタイルを選択</h2>
                <div id="lifestyle-options" class="options-grid"></div>

                <h2 style="margin-top: 30px;">趣味タグを選択</h2>
                <div id="hobby-options" class="tag-cloud"></div>

                <h2 style="margin-top: 30px;">エシカル重視度</h2>
                <div class="slider-wrapper" style="padding: 10px 0;">
                    <input type="range" id="ethical-level" class="range-slider" min="1" max="5" value="3">
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #777; margin-top: 10px;">
                        <span>効率</span>
                        <span>標準</span>
                        <span>徹底</span>
                    </div>
                    <p id="level-desc" style="text-align: center; margin-top: 10px; font-weight: bold; color: #00c853;"></p>
                </div>

                <button id="btn-generate" class="btn-generate">エシカルリストを生成する</button>
            </div>
        </section>

        <section id="screen-result" class="screen">
            <div class="hero-header" style="padding: 20px;">
                エシカルリスト
            </div>
            <div id="result-container"></div>
            <button id="btn-restart" class="btn-generate" style="background: #ccc; margin-top: 20px;">戻る</button>
        </section>
    </div>

    <script src="js/data.js"></script>
    <script src="js/algorithm.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
