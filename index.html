<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>気づかずエシカル | エシカルな買い物リストを瞬時に生成</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- いきなり選択画面からスタート -->
        <section id="screen-selection" class="screen active">
            <div class="hero-header">
                日常に心地よい選択肢を
            </div>
            
            <div class="selection-container">
                <h2>あなたのライフスタイル</h2>
                <div id="lifestyle-options" class="options-grid"></div>

                <h2 style="margin-top: 40px;">気になる趣味タグ</h2>
                <div id="hobby-options" class="tag-cloud"></div>

                <h2 style="margin-top: 40px;">エシカル重視度</h2>
                <div class="slider-wrapper" style="padding: 20px 0;">
                    <input type="range" id="ethical-level" class="range-slider" min="1" max="5" value="3">
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #777; margin-top: 10px;">
                        <span>効率重視</span>
                        <span>標準</span>
                        <span>徹底重視</span>
                    </div>
                    <p id="level-desc" style="text-align: center; margin-top: 15px; font-weight: 700; color: #2d5a27;"></p>
                </div>

                <button id="btn-generate" class="btn-generate">エシカルリストを生成する</button>
            </div>
        </section>

        <!-- 結果表示 -->
        <section id="screen-result" class="screen">
            <div class="hero-header" style="height: 100px; font-size: 1.2rem;">
                あなたの買い物リストが完成しました
            </div>
            <div id="result-container"></div>
            <button id="btn-restart" class="btn-generate" style="background: #eee; color: #333; margin-top: 40px; box-shadow: none;">最初からやり直す</button>
        </section>
    </div>

    <script src="js/data.js"></script>
    <script src="js/algorithm.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
