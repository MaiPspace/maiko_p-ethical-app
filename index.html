<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHOS | 気づかずエシカル</title>
    <!-- プレミアム・タイポグラフィ -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- サイドバー: アプリとしての品格 -->
        <aside class="sidebar">
            <h1 class="brand-logo">ETHOS</h1>
            <nav>
                <ul class="nav-list">
                    <li class="nav-item active">買い物リスト作成</li>
                    <li class="nav-item">エシカル・ブランド</li>
                    <li class="nav-item">世界の課題を知る</li>
                    <li class="nav-item">マイページ</li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <p class="brand-message">
                    <span>Peaceful Consumption.</span>
                    あなたの消費が、世界の誰かを救う。
                </p>
            </div>
        </aside>

        <!-- メインレイアウト -->
        <main class="main-layout">
            <!-- 選択画面 -->
            <div id="screen-selection" class="screen active">
                <header class="section-header">
                    <h2 class="header-title">Ethical Curation</h2>
                    <p class="header-desc">
                        世界の戦争や不当な労働。それらと自分の消費が繋がっていることに気づき、
                        自然と解決できる。そんな「気づかない」優しさを。
                    </p>
                </header>

                <section class="card-ui">
                    <h3 class="section-title">Lifestyle</h3>
                    <div id="lifestyle-options" class="options-grid"></div>
                </section>

                <section class="card-ui">
                    <h3 class="section-title">Hobbies</h3>
                    <div id="hobby-options" class="tag-cloud"></div>
                </section>

                <section class="card-ui">
                    <h3 class="section-title">Sensitivity</h3>
                    <div id="ethical-sensitivity-sliders"></div>
                </section>

                <div class="sticky-action">
                    <button id="btn-generate" class="btn-primary">GENERATE LIST</button>
                </div>
            </div>

            <!-- 結果画面 -->
            <div id="screen-result" class="screen">
                <header class="section-header">
                    <h2 class="header-title">Your List</h2>
                    <button id="btn-restart" class="nav-item" style="border:none;background:none;">← 選択に戻る</button>
                </header>
                <div id="result-container"></div>
            </div>
        </main>
    </div>

    <script src="js/whitelist.js"></script>
    <script src="js/data.js"></script>
    <script src="js/algorithm.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
